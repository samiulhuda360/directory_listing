# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name cv.seodn.com www.cv.seodn.com;
    return 301 https://$host$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl;
    server_name cv.seodn.com www.cv.seodn.com;

    ssl_certificate /etc/letsencrypt/live/cv.seodn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cv.seodn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
    }

    location / {
        proxy_pass http://web:8000;  # your Django container
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 200;
        proxy_send_timeout 200;
        send_timeout 200;
        proxy_read_timeout 180s;
    }
}
