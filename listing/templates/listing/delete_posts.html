{% extends "listing/base.html" %}
{% block title %}Delete Posts{% endblock %}

{% block content %}

{% if messages %}
<div class="mb-3">
    {% for message in messages %}
        <div class="alert alert-page {{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

<div class="page-card">
    <h5>Delete Posts</h5>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-5">
                <label for="excelFileUpload" class="form-label fw-semibold">Upload Excel File</label>
                <input class="form-control" type="file" id="excelFileUpload" name="excel_file" accept=".xlsx,.xls">
            </div>
        </div>
        <div class="mt-3 mb-3">
            <label for="linkPasteArea" class="form-label fw-semibold">Or Paste Links Here</label>
            <textarea class="form-control" id="linkPasteArea" name="links" rows="8" placeholder="Paste one URL per line..."></textarea>
        </div>
        <button type="submit" class="btn btn-danger" style="border-radius:8px;font-weight:600;padding:9px 24px;">&#128465; Submit for Deletion</button>
    </form>
</div>

<div class="page-card">
    <h5>Deletion Task Status</h5>
    <div style="border-radius:10px;overflow:hidden;">
        <table id="taskTable" class="table table-bordered mb-0 page-table">
            <thead>
                <tr>
                    <th style="width:60px">#</th>
                    <th>URL</th>
                    <th style="width:130px">Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let intervalId = setInterval(updateTaskStatuses, 8000);

    function updateTaskStatuses() {
        fetch('/check_delete_status/')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('taskTable').getElementsByTagName('tbody')[0];
                tbody.innerHTML = '';
                let allDone = true;

                data.tasks.forEach((task, index) => {
                    const row = tbody.insertRow();
                    const isSuccess = task.status === 'SUCCESS';
                    const isFailed = task.status === 'FAILED';
                    row.insertCell(0).textContent = index + 1;
                    row.insertCell(1).textContent = task.url;
                    const sc = row.insertCell(2);
                    const badge = document.createElement('span');
                    badge.className = `badge bg-${isSuccess ? 'success' : isFailed ? 'danger' : 'secondary'}`;
                    badge.style.cssText = 'font-size:13px;padding:6px 12px;';
                    badge.textContent = task.status;
                    sc.appendChild(badge);
                    if (!isSuccess && !isFailed) allDone = false;
                });

                if (allDone && data.tasks.length > 0) clearInterval(intervalId);
            })
            .catch(() => clearInterval(intervalId));
    }

    updateTaskStatuses();
});
</script>
{% endblock %}
