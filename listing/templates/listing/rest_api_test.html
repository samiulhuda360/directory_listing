{% extends "listing/base.html" %}
{% block title %}API Test{% endblock %}

{% block content %}

{% if messages %}
<div class="mb-3">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-page">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

<div class="page-card">
    <h5>WordPress REST API Testing</h5>
    <form method="post" action="{% url 'rest_api_test' %}">
        {% csrf_token %}
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label for="site-dropdown" class="form-label fw-semibold">Select Site</label>
                <select name="api_url" id="site-dropdown" class="form-select">
                    {% for config in api_configs %}
                        <option value="{{ config.website }}">{{ config.website }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" name="test_single" class="btn btn-purple">&#9654; Test Site</button>
            </div>
            <div class="col-auto">
                <button type="submit" name="test_all" class="btn btn-outline-secondary" style="border-radius:8px;font-weight:600;padding:9px 22px;">&#9654;&#9654; Test All Sites</button>
            </div>
            <div class="col-auto ms-auto">
                <a href="{% url 'download_failed_tests' %}" class="btn btn-outline-success" style="border-radius:8px;font-weight:600;padding:9px 22px;">&#8595; Download Failed List</a>
            </div>
        </div>
    </form>
</div>

<div style="border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <table class="table table-bordered mb-0 page-table">
        <thead>
            <tr>
                <th style="width:70px">#</th>
                <th>Site Name</th>
                <th style="width:140px">Status</th>
            </tr>
        </thead>
        <tbody id="test-status"></tbody>
    </table>
</div>

<script>
function updateTestStatus() {
    $.ajax({
        url: '{% url "test_status_update" %}',
        success: function(data) {
            var tbody = $('#test-status');
            tbody.empty();
            var slNo = 1;
            $.each(data, function(url, status) {
                var isSuccess = status === 'Success';
                var badgeClass = isSuccess ? 'success' : 'danger';
                var row = `<tr>
                    <td>${slNo++}</td>
                    <td>${url}</td>
                    <td><span class="badge bg-${badgeClass}" style="font-size:13px;padding:6px 12px;">${status}</span></td>
                </tr>`;
                tbody.append(row);
            });
        }
    });
}
var statusInterval = setInterval(updateTestStatus, 3000);
</script>
{% endblock %}
