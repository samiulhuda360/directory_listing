{% extends "listing/base.html" %}
{% block title %}GEO Network{% endblock %}

{% block content %}

<div class="page-card">
    <h5>GEO Network — Upload & Generate</h5>
    <form id="upload-form" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label for="xlsx_file" class="form-label fw-semibold">XLS File</label>
                <input type="file" class="form-control" id="xlsx_file" name="xlsx_file" accept=".xls,.xlsx" required>
            </div>
            <div class="col-md-3">
                <label for="num_sites" class="form-label fw-semibold">Number of Sites</label>
                <input type="number" class="form-control" id="num_sites" name="num_sites" min="1" required placeholder="e.g. 10">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-purple">&#9654; Submit</button>
            </div>
        </div>
    </form>

    <div id="result-message" class="mt-3"></div>

    <div id="progress-bar-wrap" class="mt-3" style="display:none;">
        <div class="progress" style="height:18px;border-radius:10px;background:#f0e6f8;">
            <div class="progress-bar" id="geo-progress-bar" role="progressbar" style="width:0%;background:linear-gradient(90deg,#a453ca,#85D8CE);border-radius:10px;font-size:12px;font-weight:600;transition:width .4s ease;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
        </div>
    </div>

    <ul id="result-list" class="mt-3 list-unstyled" style="font-size:14px;"></ul>
</div>

<div class="page-card">
    <h5>Download Generated Files</h5>
    <div class="d-flex gap-2 align-items-center flex-wrap">
        <select id="file-dropdown" class="form-select" style="max-width:320px;">
            <option value="" disabled selected>Select a file</option>
        </select>
        <button type="button" id="download-btn" class="btn btn-success" style="border-radius:8px;font-weight:600;" disabled>&#8595; Download</button>
    </div>
</div>

<script>
$(document).ready(function() {
    loadFilesIntoDropdown();

    $('#upload-form').on('submit', function(e) {
        e.preventDefault();
        $('#result-message').html('<div class="alert alert-info alert-page">Processing... please wait.</div>');
        $('#result-list').empty();
        $('#progress-bar-wrap').show().find('.progress-bar').css('width','0%').attr('aria-valuenow',0).text('0%');

        $.ajax({
            url: "{% url 'content_gen' %}",
            type: 'POST',
            data: new FormData(this),
            contentType: false,
            processData: false,
            success: function(response) {
                if (response.status === 'in_progress' && response.task_id) {
                    checkTaskStatus(response.task_id);
                } else {
                    $('#result-message').html('<div class="alert alert-danger alert-page">Unexpected response from server.</div>');
                }
            },
            error: function(response) {
                $('#result-message').html('<div class="alert alert-danger alert-page">' + (response.responseJSON?.message || 'Unknown error') + '</div>');
            }
        });
    });

    function checkTaskStatus(taskId) {
        $.ajax({
            url: '/api/content-gen-status/' + taskId + '/',
            type: 'GET',
            success: function(response) {
                if (response.status === 'in_progress' || response.status === 'PENDING') {
                    setTimeout(() => checkTaskStatus(taskId), 2000);
                } else if (response.status === 'single_post_done') {
                    updateProgress(response.meta);
                    setTimeout(() => checkTaskStatus(taskId), 2000);
                } else if (response.status === 'SUCCESS') {
                    if (Array.isArray(response.result)) displayFinalResults(response.result);
                    else $('#result-message').html('<div class="alert alert-danger alert-page">Unexpected result format.</div>');
                    loadFilesIntoDropdown();
                } else if (response.status === 'FAILURE') {
                    $('#result-message').html('<div class="alert alert-danger alert-page">Task failed: ' + response.message + '</div>');
                }
            },
            error: function() {
                $('#result-message').html('<div class="alert alert-danger alert-page">Error checking task status.</div>');
            }
        });
    }

    function updateProgress(meta) {
        const pct = Math.round((meta.current / meta.total) * 100);
        $('#geo-progress-bar').css('width', pct + '%').attr('aria-valuenow', pct).text(pct + '%');
        if (meta.last_posted_url && !$('#result-list').find('a[href="' + meta.last_posted_url + '"]').length) {
            $('#result-list').append(`<li>&#10003; <a href="${meta.last_posted_url}" target="_blank">${meta.last_posted_url}</a></li>`);
        }
    }

    function displayFinalResults(results) {
        $('#result-message').html('<div class="alert alert-success alert-page">&#10003; Task completed — ' + results.length + ' URLs posted.</div>');
        $('#progress-bar-wrap').hide();
        $('#result-list').empty();
        if (Array.isArray(results)) {
            results.forEach(url => {
                $('#result-list').append(`<li>&#10003; <a href="${url}" target="_blank">${url}</a></li>`);
            });
        }
    }

    function loadFilesIntoDropdown() {
        $.ajax({
            url: "{% url 'list_files_geo' %}",
            type: 'GET',
            success: function(response) {
                if (response.status === 'success') {
                    const dd = $('#file-dropdown');
                    dd.empty().append('<option value="" disabled selected>Select a file</option>');
                    response.files.forEach(f => dd.append(`<option value="${f}">${f}</option>`));
                    $('#download-btn').prop('disabled', false);
                }
            }
        });
    }

    $('#download-btn').on('click', function() {
        const sel = $('#file-dropdown').val();
        if (sel) window.location.href = '/download-file-geo/' + sel + '/';
    });
});
</script>
{% endblock %}
