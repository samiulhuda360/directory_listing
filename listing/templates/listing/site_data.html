{% extends "listing/base.html" %}
{% block title %}Site Data{% endblock %}

{% block content %}

{% if messages %}
<div class="mb-3">
    {% for message in messages %}
        <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %} alert-page">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

<div class="page-card">
    <h5>Upload Site Data</h5>
    <form id="site_data_Form" enctype="multipart/form-data" method="POST">
        {% csrf_token %}
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label for="site_excel_file" class="form-label fw-semibold">Excel File</label>
                <input type="file" class="form-control" name="site_excel_file" id="site_excel_file" accept=".xlsx,.xls">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-purple w-100">&#8679; Upload Data</button>
            </div>
        </div>
    </form>
</div>

<div class="page-card">
    <h5>Site Records</h5>
    <button id="viewData" class="btn btn-purple mb-3">&#128065; View All Site Records</button>
    <div id="dataDisplay"></div>
</div>

<style>
#dataDisplay table { width:100%; border-collapse:collapse; }
#dataDisplay th, #dataDisplay td { border:1px solid #e0d4f0; padding:10px 12px; font-size:14px; }
#dataDisplay th { background:linear-gradient(135deg,#a453ca,#85D8CE); color:#fff; font-weight:600; }
#dataDisplay tr:nth-child(even) { background:#f9f4fd; }
#dataDisplay tr:hover { background:#f0e6f8; }
</style>

<script>
document.getElementById('site_data_Form').addEventListener('submit', function(e) {
    if (!document.getElementById('site_excel_file').value) {
        alert('Please select an Excel file to upload.');
        e.preventDefault();
    }
});

document.getElementById('viewData').addEventListener('click', function() {
    this.textContent = 'Loading...';
    fetch('/api-config-data/')
        .then(r => r.json())
        .then(data => {
            let table = '<table><tr><th>SL No.</th><th>Website</th><th>Template No</th></tr>';
            data.forEach((item, i) => {
                table += `<tr><td>${i+1}</td><td>${item.website}</td><td>${item.template_no}</td></tr>`;
            });
            table += '</table>';
            document.getElementById('dataDisplay').innerHTML = table;
            document.getElementById('viewData').textContent = '↺ Refresh Records';
        })
        .catch(() => { document.getElementById('viewData').textContent = '↺ Refresh Records'; });
});
</script>
{% endblock %}
