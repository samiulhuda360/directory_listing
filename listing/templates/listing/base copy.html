<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Rest API Test{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="https://www.searchcombat.com/wp-content/uploads/2022/10/favicon_c.png"
      sizes="192x192"
    />

    <style>
      /* Global Styles */
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f4f5f7;
        margin: 0;
        padding: 0;
      }

      /* Navbar */
      .navbar {
        background: linear-gradient(to right, #a453ca, #85d8ce);
      }
      .navbar .nav-link {
        color: #fff !important;
        font-weight: 500;
        margin-right: 10px;
      }
      .navbar .nav-link.active {
        text-decoration: underline;
      }
      .navbar .btn-outline-danger {
        border-radius: 5px;
      }

      /* Card Containers */
      .card {
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }

      /* Messages */
      .alert {
        margin-top: 20px;
        font-size: 0.95rem;
      }

      /* Table */
      .table-container {
        overflow-x: auto;
        margin-top: 20px;
      }
      .table th,
      .table td {
        vertical-align: middle;
      }

      /* Centering task section */
      #taskStatusContainer {
        background-color: #fff;
        border: 1px solid #e1e1e1;
        border-radius: 5px;
        padding: 20px;
        margin: 20px auto;
        max-width: 90%;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
      <div class="container">
        <a class="navbar-brand" href="">
          <img
            src="https://www.searchcombat.com/wp-content/uploads/2022/10/Search-combat-logo-01.png"
            alt="Search Combat Logo"
            height="40"
          />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <a
                class="nav-link {% if request.path == '/' %}active{% endif %}"
                href="/"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'unique_consecutive_domain' %}active{% endif %}"
                href="{% url 'unique_consecutive_domain' %}"
                >Unique Consecutive Domain</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'site_data' %}active{% endif %}"
                href="{% url 'site_data' %}"
                >Site Data</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'rest_api_test' %}active{% endif %}"
                href="{% url 'rest_api_test' %}"
                >Rest API Test</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'post_update' %}active{% endif %}"
                href="{% url 'post_update' %}"
                >Update Post</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'delete_posts' %}active{% endif %}"
                href="{% url 'delete_posts' %}"
                >Delete Posts</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'content_gen' %}active{% endif %}"
                href="{% url 'content_gen' %}"
                >GEO Network</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link {% if request.resolver_match.url_name == 'summary_post' %}active{% endif %}"
                href="{% url 'summary_post' %}"
                >Summary Submission</a
              >
            </li>
            {% endif %}
          </ul>

          <ul class="navbar-nav">
            <li class="nav-item">
              {% if user.is_authenticated %}
              <a
                class="nav-link btn btn-outline-danger"
                href="{% url 'logout' %}"
                >Logout</a
              >
              {% endif %}
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
      {% block content %}
      <!-- Child templates will override this -->
      {% endblock %}
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.6.0/dist/socket.io.min.js"></script>
  </body>
</html>
