version: '3.8'

services:
  redis:
    image: 'redis:alpine'
    command: redis-server --maxmemory 150mb --maxmemory-policy allkeys-lru
    # ports:
    #   - "6379:6379"

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 --timeout 120 directory_listing.wsgi:application --no-sendfile
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    environment: # Added for only internal communication
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

nginx:
  image: nginx:alpine
  ports:
    - '127.0.0.1:8080:80' # Only accessible from server
  volumes:
    - static_volume:/app/staticfiles
    - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  depends_on:
    - web

  celery:
    build: .
    command: celery -A directory_listing worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - web
      - redis

volumes:
  static_volume:
